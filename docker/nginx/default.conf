map $http_x_forwarded_proto $proxy_https {
    default '';
    https on;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 128M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_host;
        fastcgi_param HTTPS $proxy_https;
    }

    # Static assets that exist on disk (storage symlink, build, filament)
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff2?|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # JS/CSS: serve file if present, otherwise Laravel (Livewire, Filament routes)
    location ~* \.(js|css)$ {
        try_files $uri /index.php?$query_string;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
