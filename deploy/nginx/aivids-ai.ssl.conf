server {
    listen 80;
    server_name ai.saittikhonova.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name ai.saittikhonova.ru;

    ssl_certificate /etc/letsencrypt/live/ai.saittikhonova.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.saittikhonova.ru/privkey.pem;

    client_max_body_size 128M;

    location / {
        proxy_pass http://172.19.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
